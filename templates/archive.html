<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stoichio – Archive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
  </head>
  <body>
    <main class="container py-5">
      <h1 class="mb-3">Archive</h1>
      <p class="text-muted">Past weekly posts will live here (will be added over time).</p>

<ul class="list-group mt-4">
  {% for post in posts %}
  <li class="list-group-item d-flex justify-content-between align-items-center">
    <div>
      <div>{{ post['title'] }}</div>
      <small class="text-muted">{{ post['summary'] }}</small>
    </div>
    <span class="text-muted small">{{ post['date'] }}</span>
  </li>
  {% else %}
  <li class="list-group-item text-muted">No posts yet.</li>
  {% endfor %}
</ul>

      <div class="mt-4">
        <a class="btn btn-outline-secondary" href="/recently">Back to Recently</a>
      </div>
    </main>
  </body>
</html>
